<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chat - Groq</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #161820;
      --border: #252733;
      --accent: #00d4aa;
      --accent2: #0099ff;
      --text: #e2e8f0;
      --muted: #5a6080;
      --user-bubble: #0f2027;
      --ai-bubble: #161820;
      --glow: rgba(0, 212, 170, 0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 50% 35% at 10% 15%, rgba(0,212,170,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 90% 85%, rgba(0,153,255,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 10;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(13,15,20,0.85);
      backdrop-filter: blur(14px);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 18px var(--glow);
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.06em;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-text p {
      font-size: 10px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      margin-top: 1px;
    }

    .badge {
      margin-left: auto;
      background: rgba(0,212,170,0.12);
      border: 1px solid rgba(0,212,170,0.3);
      color: var(--accent);
      font-size: 10px;
      font-family: 'Space Mono', monospace;
      padding: 3px 8px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .badge::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
      z-index: 1;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .msg {
      display: flex;
      gap: 9px;
      animation: fadeUp 0.25s ease;
      max-width: 94%;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; align-self: flex-end; }
    .msg.ai   { align-self: flex-start; }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 8px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }

    .msg.ai .avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 0 10px var(--glow);
    }

    .msg.user .avatar {
      background: var(--user-bubble);
      border: 1px solid var(--border);
    }

    .bubble {
      padding: 11px 14px;
      border-radius: 14px;
      font-size: 13.5px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.ai .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
    }

    .msg.user .bubble {
      background: var(--user-bubble);
      border: 1px solid rgba(0,212,170,0.2);
      border-top-right-radius: 4px;
      color: #a0f0e0;
    }

    /* Typing */
    .typing .bubble {
      display: flex; gap: 5px; align-items: center;
      padding: 14px 16px;
    }

    .dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1.1s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-7px); opacity: 1; }
    }

    /* Welcome */
    #welcome {
      text-align: center;
      margin: auto;
      padding: 24px 16px;
    }

    #welcome .big-icon {
      font-size: 52px;
      margin-bottom: 14px;
      animation: float 3s ease-in-out infinite;
      display: block;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    #welcome h2 {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 6px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #welcome p {
      font-size: 12px;
      color: var(--muted);
      max-width: 260px;
      margin: 0 auto 18px;
      line-height: 1.6;
    }

    .suggestions {
      display: flex;
      flex-direction: column;
      gap: 7px;
      max-width: 290px;
      margin: 0 auto;
    }

    .suggestion-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 13px;
      border-radius: 10px;
      font-size: 12.5px;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
    }

    .suggestion-btn:hover, .suggestion-btn:active {
      border-color: var(--accent);
      background: rgba(0,212,170,0.08);
      transform: translateX(4px);
      color: var(--accent);
    }

    /* Model selector */
    #model-bar {
      position: relative;
      z-index: 10;
      padding: 8px 14px 0;
      background: rgba(13,15,20,0.9);
      backdrop-filter: blur(12px);
      display: flex;
      gap: 6px;
      overflow-x: auto;
    }

    #model-bar::-webkit-scrollbar { display: none; }

    .model-chip {
      flex-shrink: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .model-chip.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0,212,170,0.08);
    }

    /* Input */
    #input-area {
      position: relative;
      z-index: 10;
      padding: 10px 14px 16px;
      border-top: 1px solid var(--border);
      background: rgba(13,15,20,0.9);
      backdrop-filter: blur(12px);
    }

    /* API Key input section */
    #api-setup {
      background: rgba(0,212,170,0.05);
      border: 1px solid rgba(0,212,170,0.2);
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 10px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #api-setup input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--accent);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
    }

    #api-setup input::placeholder { color: var(--muted); }

    #save-key-btn {
      background: var(--accent);
      color: #0d0f14;
      border: none;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      flex-shrink: 0;
    }

    #input-row {
      display: flex;
      gap: 9px;
      align-items: flex-end;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 9px 12px;
      transition: border-color 0.2s;
    }

    #input-row:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 13.5px;
      resize: none;
      min-height: 22px;
      max-height: 120px;
      line-height: 1.5;
      overflow-y: auto;
    }

    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      width: 34px; height: 34px;
      border-radius: 9px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      color: #0d0f14;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s, opacity 0.15s;
      box-shadow: 0 3px 12px var(--glow);
    }

    #send-btn:active { transform: scale(0.9); }
    #send-btn:disabled { opacity: 0.35; cursor: default; }

    .hint {
      font-size: 10px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      margin-top: 7px;
      text-align: center;
    }

    /* Clear button */
    #clear-btn {
      position: absolute;
      top: 14px;
      right: 18px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 10px;
      font-family: 'Space Mono', monospace;
      cursor: pointer;
      z-index: 11;
      transition: all 0.2s;
    }

    #clear-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  </style>
</head>
<body>

<header>
  <div class="logo">⚡</div>
  <div class="header-text">
    <h1>GROQ AI CHAT</h1>
    <p>Ultra-fast inference · Free tier</p>
  </div>
  <div class="badge">GRATIS</div>
</header>

<div id="model-bar">
  <div class="model-chip active" onclick="selectModel(this, 'llama-3.3-70b-versatile')">Llama 3.3 70B</div>
  <div class="model-chip" onclick="selectModel(this, 'llama-3.1-8b-instant')">Llama 3.1 8B ⚡</div>
  <div class="model-chip" onclick="selectModel(this, 'gemma2-9b-it')">Gemma 2 9B</div>
  <div class="model-chip" onclick="selectModel(this, 'mixtral-8x7b-32768')">Mixtral 8x7B</div>
</div>

<div id="messages">
  <div id="welcome">
    <span class="big-icon">⚡</span>
    <h2>Groq AI — Super Cepat!</h2>
    <p>Gratis tanpa kartu kredit. Daftar di console.groq.com lalu masukkan API key di bawah.</p>
    <div class="suggestions">
      <button class="suggestion-btn" onclick="sendSuggestion(this)">🧠 Jelaskan machine learning</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">💻 Buatkan fungsi Python</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">✍️ Tulis puisi tentang teknologi</button>
    </div>
  </div>
</div>

<div id="input-area">
  <div id="api-setup">
    <span style="font-size:14px">🔑</span>
    <input type="password" id="api-key-input" placeholder="Paste API key Groq kamu di sini..." />
    <button id="save-key-btn" onclick="saveKey()">SIMPAN</button>
  </div>
  <div id="input-row">
    <textarea id="user-input" placeholder="Ketik pesan..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
  <p class="hint">Dapatkan API key gratis di <strong style="color:var(--accent)">console.groq.com</strong></p>
</div>

<button id="clear-btn" onclick="clearChat()">🗑 Clear</button>

<script>
  // State
  let API_KEY = localStorage.getItem("groq_api_key") || "";
  let selectedModel = "llama-3.3-70b-versatile";
  let history = [];
  let isLoading = false;

  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("user-input");
  const sendBtn = document.getElementById("send-btn");
  const apiKeyInput = document.getElementById("api-key-input");
  const apiSetup = document.getElementById("api-setup");

  // Load saved key
  if (API_KEY) {
    apiKeyInput.value = API_KEY;
    apiSetup.style.borderColor = "rgba(0,212,170,0.5)";
    apiSetup.querySelector("input").placeholder = "API key tersimpan ✓";
  }

  function saveKey() {
    const val = apiKeyInput.value.trim();
    if (!val) return alert("Masukkan API key dulu!");
    API_KEY = val;
    localStorage.setItem("groq_api_key", val);
    apiSetup.style.borderColor = "rgba(0,212,170,0.6)";
    apiSetup.style.background = "rgba(0,212,170,0.08)";
    apiKeyInput.placeholder = "API key tersimpan ✓";
    apiKeyInput.value = "";
    alert("✅ API key disimpan! Sekarang bisa langsung chat.");
  }

  function selectModel(el, model) {
    document.querySelectorAll(".model-chip").forEach(c => c.classList.remove("active"));
    el.classList.add("active");
    selectedModel = model;
  }

  function clearChat() {
    history = [];
    messagesEl.innerHTML = `
      <div id="welcome" style="text-align:center;margin:auto;padding:24px 16px">
        <span style="font-size:48px;display:block;margin-bottom:14px">⚡</span>
        <h2 style="font-size:20px;font-weight:800;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent">Chat Direset!</h2>
        <p style="font-size:12px;color:var(--muted);margin-top:8px">Mulai percakapan baru...</p>
      </div>`;
  }

  // Auto-resize
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
  });

  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function sendSuggestion(btn) {
    inputEl.value = btn.textContent.replace(/^.{2}\s/, "");
    sendMessage();
  }

  function addMessage(role, text) {
    const welcome = document.getElementById("welcome");
    if (welcome) welcome.remove();

    const wrap = document.createElement("div");
    wrap.className = `msg ${role}`;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "ai" ? "⚡" : "👤";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  function showTyping() {
    const wrap = document.createElement("div");
    wrap.className = "msg ai typing";
    wrap.id = "typing-indicator";
    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = "⚡";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing-indicator");
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    if (!API_KEY) {
      alert("⚠️ Masukkan API key Groq dulu!\n\nDapatkan gratis di: console.groq.com");
      apiKeyInput.focus();
      return;
    }

    inputEl.value = "";
    inputEl.style.height = "auto";
    isLoading = true;
    sendBtn.disabled = true;

    addMessage("user", text);
    history.push({ role: "user", content: text });
    showTyping();

    try {
      const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + API_KEY
        },
        body: JSON.stringify({
          model: selectedModel,
          messages: [
            {
              role: "system",
              content: "Kamu adalah asisten AI yang cerdas, ramah, dan sangat membantu. Jawab dalam bahasa yang sama dengan pertanyaan pengguna. Jawaban harus jelas dan terstruktur."
            },
            ...history
          ],
          max_tokens: 1024,
          temperature: 0.7
        })
      });

      const data = await res.json();
      removeTyping();

      if (data.error) {
        addMessage("ai", "⚠️ Error: " + data.error.message);
      } else {
        const reply = data.choices[0].message.content;
        addMessage("ai", reply);
        history.push({ role: "assistant", content: reply });
      }

    } catch (err) {
      removeTyping();
      addMessage("ai", "❌ Gagal terhubung ke Groq.\n\nPastikan:\n• API key sudah benar\n• Koneksi internet aktif\n\nError: " + err.message);
    }

    isLoading = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
  </html>
